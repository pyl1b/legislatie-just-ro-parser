{% extends "base.html" %}
{% block content %}
<h1>{{ tr('documents_title', 'Documents') }}</h1>

<ul class="list-group">
  {% for doc in documents %}
    <li class="list-group-item">
      <a href="/documents/{{ doc.ver_id }}?format=html&lang={{ lang }}">{{ doc.title }}</a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
